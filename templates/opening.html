<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Predicta Shelf</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated Background */
        .background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255, 217, 61, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(255, 142, 83, 0.15) 0%, transparent 50%);
            animation: pulseBackground 8s ease-in-out infinite;
        }

        .background::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(45deg, transparent 30%, rgba(255, 107, 107, 0.05) 50%, transparent 70%),
                linear-gradient(-45deg, transparent 30%, rgba(255, 217, 61, 0.05) 50%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes pulseBackground {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 217, 61, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Main Content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            animation: fadeInUp 1.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .logo-icon {
            font-size: 6rem;
            display: block;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 217, 61, 0.5));
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-20px);
            }
            60% {
                transform: translateY(-10px);
            }
        }

        .app-name {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B6B, #FFD93D, #FF8E53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(255, 217, 61, 0.8));
            }
        }

        .app-name em {
            font-style: italic;
            color: #FFD93D;
            -webkit-text-fill-color: #FFD93D;
        }

        .tagline {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            margin-bottom: 3rem;
            letter-spacing: 0.1em;
        }

        .enter-prompt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .enter-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .enter-key {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            background: rgba(255, 217, 61, 0.1);
            border: 2px solid rgba(255, 217, 61, 0.3);
            border-radius: 50px;
            font-size: 0.9rem;
            color: #FFD93D;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .enter-key:hover {
            background: rgba(255, 217, 61, 0.2);
            border-color: rgba(255, 217, 61, 0.5);
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 217, 61, 0.3);
        }

        .enter-key kbd {
            background: rgba(255, 217, 61, 0.2);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-icon {
                font-size: 4rem;
            }

            .app-name {
                font-size: 2.5rem;
            }

            .tagline {
                font-size: 1.2rem;
            }

            .enter-text {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .logo-icon {
                font-size: 3rem;
            }

            .app-name {
                font-size: 2rem;
            }

            .tagline {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="particles" id="particles"></div>
    
    <div class="content">
        <div class="logo-container">
            <span class="logo-icon">🏺</span>
        </div>
        
        <h1 class="app-name">Predicta <em>Shelf</em></h1>
        <p class="tagline">Smart Shelf Life Management</p>
        
        <div class="enter-prompt">
            <span class="enter-text">Press Enter to Continue</span>
            <div class="enter-key" onclick="navigateToLogin()">
                <kbd>ENTER</kbd>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.opacity = Math.random() * 0.5 + 0.3;
                container.appendChild(particle);
            }
        }

        // Navigate to login page
        function navigateToLogin() {
            window.location.href = '/login';
        }

        // Listen for Enter key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                navigateToLogin();
            }
        });

        // Initialize particles on load
        window.addEventListener('load', createParticles);
    </script>
</body>
</html>
